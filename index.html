<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>AR 故事播放器 - 稳定防抖版</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      #debug-console { position: fixed; top: 0; left: 0; width: 100%; height: 15vh; background: rgba(0, 0, 0, 0.7); color: #00FF00; font-family: monospace; font-size: 11px; overflow-y: auto; z-index: 9999; padding: 10px; box-sizing: border-box; pointer-events: none; }
      #subtitle-container { position: fixed; bottom: 8%; left: 5%; width: 90%; text-align: center; z-index: 9998; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
      #subtitle-text { display: inline-block; background: rgba(0, 0, 0, 0.7); color: white; padding: 12px 24px; border-radius: 8px; font-size: 15px; text-align: left; line-height: 1.5; max-width: 100%; word-wrap: break-word; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
      #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
      #start-btn { padding: 15px 30px; background: #4CC3D9; border: none; border-radius: 5px; color: white; cursor: pointer; font-size: 18px; font-weight: bold;}
    </style>
  </head>
  <body>
    
    <div id="start-screen">
      <h3 style="margin-bottom: 20px;">📖 小红帽 AR 剧场</h3>
      <button id="start-btn">点击进入并解锁媒体</button>
    </div>

    <div id="debug-console">> 引擎初始化...<br></div>
    <div id="subtitle-container"><div id="subtitle-text"></div></div>

    <script>
      const debugConsole = document.getElementById('debug-console');
      function printLog(msg, color = '#00FF00') {
        debugConsole.innerHTML += `<div style="color:${color}">> ${msg}</div>`;
        debugConsole.scrollTop = debugConsole.scrollHeight;
      }

      let globalConfig = null;
      let preloadedVideos = {}; 
      let activeTimers = [];
      let activeMedia = [];
      
      // 【新增】防抖控制变量
      let isPlaying = false; 
      let lostTimeout = null;

      fetch('./story_config.json')
        .then(res => res.json())
        .then(data => { globalConfig = data; printLog("✅ 剧本已就绪"); })
        .catch(e => printLog("❌ 找不到 story_config.json 文件", "red"));

      document.getElementById('start-btn').onclick = () => {
        document.getElementById('start-screen').style.display = 'none';
        printLog("🔓 正在解锁浏览器媒体限制...");

        if (globalConfig && globalConfig.timeline) {
          globalConfig.timeline.forEach(step => {
            if (step.action === 'playVideo') {
              let v = document.createElement('video');
              v.id = 'vid_' + step.time_ms;
              v.src = step.value; 
              v.crossOrigin = "anonymous";
              v.setAttribute('playsinline', '');
              v.setAttribute('webkit-playsinline', '');
              v.style.display = 'none';
              
              v.muted = true; 
              v.play().then(() => {
                v.pause();
                v.currentTime = 0;
                v.muted = false; 
                printLog(`📦 视频解锁成功`);
              }).catch(e => printLog(`❌ 视频解锁失败: ${e.message}`, "orange"));

              document.body.appendChild(v);
              preloadedVideos[step.time_ms] = v; 
            }
          });
        }
      };

      document.addEventListener("DOMContentLoaded", function() {
        const targetEl = document.querySelector('[mindar-image-target]');
        const subtitleContainer = document.getElementById('subtitle-container');
        const subtitleText = document.getElementById('subtitle-text');

        targetEl.addEventListener("targetFound", () => {
          // 【核心修复：防抖】如果之前是“疑似丢失”状态，现在找回来了，那就取消清理！
          if (lostTimeout) {
            clearTimeout(lostTimeout);
            lostTimeout = null;
            printLog("🎯 追踪恢复 (忽略微小闪烁)");
            return; // 已经在这个时间线上了，直接 return，防止重复叠加视频
          }
          
          if (isPlaying) return; // 如果已经在正常播放中，防抖
          isPlaying = true;
          
          printLog("🎯 发现目标，开始演出...");
          
          if(!globalConfig) return;

          globalConfig.timeline.forEach(step => {
            let startT = setTimeout(() => {
              
              if (step.action === 'showText') {
                subtitleText.innerText = step.value;
                subtitleContainer.style.opacity = 1;
                setTimeout(() => { if(subtitleText.innerText === step.value) subtitleContainer.style.opacity = 0; }, step.duration_ms);
              } 
              
              else if (step.action === 'playVideo') {
                printLog(`🎬 挂载视频`);
                let v = preloadedVideos[step.time_ms]; 
                
                if (v) {
                  let ve = document.createElement('a-video');
                  ve.setAttribute('src', '#' + v.id);
                  
                  // 【核心修复：缩放与对齐】
                  // 将宽度设为 1（与识别图宽度一致），假设视频是 16:9，则高度为 9/16 = 0.5625
                  ve.setAttribute('width', '1');
                  ve.setAttribute('height', '0.5625'); 
                  // 放在图片正中央，Z 轴抬高 0.05 防止与图片重叠闪烁
                  ve.setAttribute('position', '0 0 0.05'); 
                  
                  targetEl.appendChild(ve);
                  v.play();
                  activeMedia.push({html: v, el: ve});

                  setTimeout(() => {
                    if (ve.parentNode) ve.parentNode.removeChild(ve);
                    v.pause();
                    v.currentTime = 0;
                  }, step.duration_ms);
                }
              }
            }, step.time_ms);
            
            activeTimers.push(startT);
          });
        });

        targetEl.addEventListener("targetLost", () => {
          printLog("⚠️ 追踪疑似丢失，等待 1 秒确认...");
          
          // 【核心修复：延迟清理】不马上清理，给 1 秒钟的缓冲期
          lostTimeout = setTimeout(() => {
            printLog("🛑 追踪彻底丢失，清理场景");
            isPlaying = false;
            
            activeTimers.forEach(clearTimeout);
            activeTimers = [];
            
            activeMedia.forEach(m => { 
              if(m.el.parentNode) m.el.parentNode.removeChild(m.el); 
              m.html.pause(); 
              m.html.currentTime = 0; 
            });
            activeMedia = [];
            subtitleContainer.style.opacity = 0;
            
            lostTimeout = null;
          }, 1000); // 1000毫秒 = 1秒缓冲时间
        });
      });
    </script>

    <a-scene mindar-image="imageTargetSrc: targets.mind; filterMinCF:0.0001; filterBeta:0.001;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0"></a-entity>
    </a-scene>
  </body>
</html>
