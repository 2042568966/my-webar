<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>AR 故事播放器 - 持续时间控制版</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <style>
      #debug-console { position: fixed; top: 0; left: 0; width: 100%; height: 15vh; background: rgba(0, 0, 0, 0.7); color: #00FF00; font-family: monospace; font-size: 12px; overflow-y: auto; z-index: 9999; padding: 10px; box-sizing: border-box; pointer-events: none; }
      .log-error { color: #FF4444; } .log-warn { color: #FFAA00; }
      #subtitle-container { position: fixed; bottom: 10%; left: 5%; width: 90%; text-align: center; z-index: 9998; pointer-events: none; opacity: 0; transition: opacity 0.5s ease-in-out; }
      #subtitle-text { display: inline-block; background: rgba(0, 0, 0, 0.6); color: white; padding: 10px 20px; border-radius: 8px; font-size: 18px; text-shadow: 1px 1px 2px black; max-width: 100%; word-wrap: break-word; }
      #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-family: sans-serif; }
      #start-btn { padding: 15px 40px; font-size: 20px; background: #4CC3D9; border: none; border-radius: 30px; color: white; margin-top: 20px; cursor: pointer; box-shadow: 0 4px 15px rgba(76,195,217,0.4); }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <div id="start-screen">
      <h2>📖 准备好进入小红帽的故事了吗？</h2>
      <p>请确保已开启手机音量</p>
      <button id="start-btn">点击进入 AR 世界</button>
    </div>

    <div id="debug-console">🚀 AR 控制台已启动...<br></div>
    <div id="subtitle-container"><div id="subtitle-text"></div></div>

    <script>
      const debugConsole = document.getElementById('debug-console');
      function printLog(msg, className = '') {
        debugConsole.innerHTML += `<div class="${className}">> ${msg}</div>`;
        debugConsole.scrollTop = debugConsole.scrollHeight;
      }

      let activeTimers = [];        
      let globalMediaElements = []; // 用于在追踪丢失时强制清理所有素材

      document.getElementById('start-btn').addEventListener('click', function() {
        document.getElementById('start-screen').style.display = 'none';
        printLog("✅ 用户已授权互动，媒体播放已解锁");
      });

      document.addEventListener("DOMContentLoaded", function() {
        const targetEl = document.querySelector('[mindar-image-target]');
        const subtitleContainer = document.getElementById('subtitle-container');
        const subtitleText = document.getElementById('subtitle-text');

        targetEl.addEventListener("targetFound", event => {
          printLog("🎯 发现目标图片！正在执行剧本...");
          
          fetch('./story_config.json')
            .then(response => response.json())
            .then(config => {
              
              config.timeline.forEach(step => {
                // 1. 触发定时器：何时开始动作
                let startTimer = setTimeout(() => {
                  const duration = step.duration_ms || 3000; // 获取持续时间，保底3秒
                  
                  // 为每个动作建立独立的局部变量，防止互相覆盖
                  let localModel = null;
                  let localVideoHtml = null;
                  let localVideoEl = null;
                  let localAudio = null;

                  if (step.action === 'showText') {
                    subtitleText.innerText = step.value;
                    subtitleContainer.style.opacity = 1;
                  } 
                  else if (step.action === 'playSound') {
                    localAudio = new Audio(step.value);
                    localAudio.play().catch(e => printLog("音频播放失败", 'log-error'));
                    globalMediaElements.push(localAudio);
                  }
                  else if (step.action === 'playAnimation') {
                    localModel = document.createElement('a-gltf-model');
                    localModel.setAttribute('src', step.value);
                    localModel.setAttribute('scale', '0.5 0.5 0.5'); 
                    localModel.setAttribute('animation-mixer', 'loop: once; clampWhenFinished: true'); 
                    targetEl.appendChild(localModel);
                    globalMediaElements.push(localModel);
                  }
                  else if (step.action === 'playVideo') {
                    localVideoHtml = document.createElement('video');
                    localVideoHtml.id = 'video-' + Date.now() + Math.floor(Math.random()*1000);
                    localVideoHtml.src = step.value;
                    localVideoHtml.crossOrigin = 'anonymous';
                    localVideoHtml.loop = false;
                    localVideoHtml.setAttribute('playsinline', ''); 
                    localVideoHtml.setAttribute('webkit-playsinline', '');
                    document.body.appendChild(localVideoHtml);

                    localVideoEl = document.createElement('a-video');
                    localVideoEl.setAttribute('src', '#' + localVideoHtml.id);
                    localVideoEl.setAttribute('width', '1.6');
                    localVideoEl.setAttribute('height', '0.9');
                    localVideoEl.setAttribute('position', '0 0.5 0'); 
                    targetEl.appendChild(localVideoEl);
                    
                    localVideoHtml.play().catch(e => printLog("视频播放失败", 'log-error'));
                    globalMediaElements.push({html: localVideoHtml, el: localVideoEl});
                  }
                  
                  // 2. 结束定时器：何时停止并清理该动作
                  let endTimer = setTimeout(() => {
                    // 只有当当前显示的字幕依然是“我这句话”时才撤下（防止被后来者覆盖后误杀）
                    if (step.action === 'showText' && subtitleText.innerText === step.value) {
                      subtitleContainer.style.opacity = 0;
                    } 
                    else if (step.action === 'playAnimation' && localModel) {
                      if (localModel.parentNode) localModel.parentNode.removeChild(localModel);
                    }
                    else if (step.action === 'playVideo' && localVideoEl) {
                      if (localVideoEl.parentNode) localVideoEl.parentNode.removeChild(localVideoEl);
                      localVideoHtml.pause();
                      localVideoHtml.remove();
                    }
                    else if (step.action === 'playSound' && localAudio) {
                       localAudio.pause();
                    }
                  }, duration); // 核心：使用 JSON 里的持续时间触发清理
                  
                  activeTimers.push(endTimer);
                  
                }, step.time_ms);
                
                activeTimers.push(startTimer);
              });
            })
            .catch(error => printLog("❌ 剧本拉取失败: " + error, 'log-error'));
        });

        // ⚠️ 目标丢失时：彻底大扫除
        targetEl.addEventListener("targetLost", event => {
          printLog("⚠️ 目标丢失，清理场景...");
          activeTimers.forEach(t => clearTimeout(t));
          activeTimers = [];
          subtitleContainer.style.opacity = 0;
          
          globalMediaElements.forEach(item => {
            if (item instanceof Audio) {
               item.pause();
            } else if (item.html && item.el) {
               if (item.el.parentNode) item.el.parentNode.removeChild(item.el);
               item.html.pause();
               item.html.remove();
            } else if (item.parentNode) {
               item.parentNode.removeChild(item);
            }
          });
          globalMediaElements = [];
        });
      });
    </script>

    <a-scene mindar-image="imageTargetSrc: targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0"></a-entity>
    </a-scene>
  </body>
</html>
