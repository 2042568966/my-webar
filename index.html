<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>小红帽 AR 奇幻剧场</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
      
      body { margin: 0; overflow: hidden; font-family: 'ZCOOL KuaiLe', 'Comic Sans MS', 'PingFang SC', sans-serif; }
      
      /* 童话风启动屏 */
      #start-screen { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); 
        z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; 
        transition: opacity 0.5s;
      }
      .welcome-card {
        background: rgba(255, 255, 255, 0.95); padding: 40px 30px; border-radius: 30px;
        text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); border: 4px solid #fff; width: 80%; max-width: 320px;
      }
      h2 { color: #ff6b6b; font-size: 28px; margin: 0 0 15px 0; text-shadow: 2px 2px 0px #ffeaa7; }
      p { color: #576574; font-size: 16px; margin-bottom: 30px; font-weight: bold; line-height: 1.4; }
      
      #start-btn { 
        padding: 15px 40px; background: #ff9f43; border: 4px solid #fff; border-radius: 50px; 
        color: white; font-size: 20px; font-weight: bold; cursor: pointer; 
        box-shadow: 0 8px 15px rgba(255, 159, 67, 0.4); animation: pulse 2s infinite ease-in-out; transition: all 0.3s;
      }
      @keyframes pulse {
        0% { transform: scale(1); box-shadow: 0 8px 15px rgba(255, 159, 67, 0.4); }
        50% { transform: scale(1.08); box-shadow: 0 15px 25px rgba(255, 159, 67, 0.6); }
        100% { transform: scale(1); box-shadow: 0 8px 15px rgba(255, 159, 67, 0.4); }
      }

      /* 【新增】儿童版专属自定义扫描框 */
      #custom-scanner {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 9997; pointer-events: none; display: none;
        flex-direction: column; justify-content: center; align-items: center;
      }
      .scan-frame {
        width: 70vw; height: 70vw; max-width: 400px; max-height: 400px;
        border: 6px dashed #ff9f43; border-radius: 20px;
        box-shadow: 0 0 0 100vmax rgba(0, 0, 0, 0.5); /* 压暗四周，让小朋友的注意力集中在中间 */
      }
      .scan-tip {
        margin-top: 30px; background: #ff9f43; color: white;
        padding: 12px 25px; border-radius: 30px; font-weight: bold; font-size: 18px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        animation: floatUpDown 2s ease-in-out infinite;
      }
      @keyframes floatUpDown {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      /* 气泡字幕 */
      #subtitle-container { position: fixed; bottom: 8%; left: 5%; width: 90%; text-align: center; z-index: 9998; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
      #subtitle-text { display: inline-block; background: #ffffff; color: #576574; padding: 15px 25px; border-radius: 25px; font-size: 18px; text-align: left; line-height: 1.5; max-width: 90%; word-wrap: break-word; box-shadow: 0 8px 20px rgba(0,0,0,0.15); border: 4px solid #ff9f43; position: relative; font-weight: bold; }
      #subtitle-text::after { content: ''; position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%); border-width: 14px 14px 0; border-style: solid; border-color: #ff9f43 transparent transparent transparent; }
      #subtitle-text::before { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); border-width: 10px 10px 0; border-style: solid; border-color: #ffffff transparent transparent transparent; z-index: 1; }
    </style>
  </head>
  <body>
    
    <div id="start-screen">
      <div class="welcome-card">
        <h2>🍄 小红帽奇幻剧场</h2>
        <p>把手机对准绘本封面<br>故事就会跑出来哦！</p>
        <button id="start-btn">开始魔法</button>
      </div>
    </div>

    <div id="custom-scanner">
      <div class="scan-frame"></div>
      <div class="scan-tip">请将小红帽放进框框里</div>
    </div>

    <div id="subtitle-container"><div id="subtitle-text"></div></div>

    <script>
      let globalConfig = null;
      let preloadedVideos = {}; 
      let activeTimers = [];
      let activeMedia = [];
      
      let isPlaying = false; 
      let lostTimeout = null;
      
      // 【核心逻辑】：状态锁，确保引擎和用户都准备好了才进入
      let engineReady = false;
      let userClicked = false;

      fetch('./story_config.json')
        .then(res => res.json())
        .then(data => { globalConfig = data; })
        .catch(e => console.error("找不到剧本"));

      // 监听 AR 引擎的“真·就绪”事件
      document.addEventListener("DOMContentLoaded", function() {
        const sceneEl = document.querySelector('a-scene');
        sceneEl.addEventListener("arReady", () => {
          console.log("AR 引擎已完成初始化");
          engineReady = true;
          checkStart(); // 尝试触发进入流程
        });
      });

      // 按钮点击事件
      document.getElementById('start-btn').onclick = function() {
        userClicked = true;
        
        // 改变按钮状态，安抚用户等待
        this.innerText = "✨ 魔法唤醒中...";
        this.style.animation = "none";
        this.style.transform = "scale(0.95)";
        this.style.pointerEvents = "none";
        
        if (globalConfig && globalConfig.timeline) {
          globalConfig.timeline.forEach(step => {
            if (step.action === 'playVideo') {
              let v = document.createElement('video');
              v.id = 'vid_' + step.time_ms;
              v.src = step.value; 
              v.crossOrigin = "anonymous";
              v.setAttribute('playsinline', '');
              v.setAttribute('webkit-playsinline', '');
              v.setAttribute('preload', 'auto');
              v.style.display = 'none';
              v.muted = true; 
              document.body.appendChild(v);
              preloadedVideos[step.time_ms] = v; 

              const playPromise = v.play();
              if (playPromise !== undefined) {
                playPromise.then(() => {
                  setTimeout(() => { v.pause(); v.currentTime = 0; v.muted = false; }, 50);
                }).catch(e => console.warn("视频预加载被拦截"));
              }
            }
          });
        }
        
        checkStart(); // 尝试触发进入流程
      };

      // 【全新加入】核验器：只要两者都 Ready，才真正移除遮罩
      function checkStart() {
        if (engineReady && userClicked) {
          // 渐隐移除启动屏
          document.getElementById('start-screen').style.opacity = '0';
          setTimeout(() => { 
            document.getElementById('start-screen').style.display = 'none'; 
            // 显示扫描引导框
            document.getElementById('custom-scanner').style.display = 'flex';
          }, 500);
        }
      }

      // AR 核心执行
      document.addEventListener("DOMContentLoaded", function() {
        const targetEl = document.querySelector('[mindar-image-target]');
        const subtitleContainer = document.getElementById('subtitle-container');
        const subtitleText = document.getElementById('subtitle-text');
        const customScanner = document.getElementById('custom-scanner');

        targetEl.addEventListener("targetFound", () => {
          if (lostTimeout) {
            clearTimeout(lostTimeout);
            lostTimeout = null;
            return; 
          }
          
          if (isPlaying) return; 
          isPlaying = true;
          
          // 发现目标后，隐藏引导框
          customScanner.style.display = 'none';
          
          if(!globalConfig) return;

          globalConfig.timeline.forEach(step => {
            let startT = setTimeout(() => {
              
              if (step.action === 'showText') {
                subtitleText.innerText = step.value;
                subtitleContainer.style.opacity = 1;
                setTimeout(() => { if(subtitleText.innerText === step.value) subtitleContainer.style.opacity = 0; }, step.duration_ms);
              } 
              
              else if (step.action === 'playVideo') {
                let v = preloadedVideos[step.time_ms]; 
                if (v) {
                  let ve = document.createElement('a-video');
                  ve.setAttribute('src', '#' + v.id);
                  ve.setAttribute('width', '1');
                  ve.setAttribute('height', '0.5625'); 
                  ve.setAttribute('position', '0 0 0.05'); 
                  targetEl.appendChild(ve);
                  
                  const playPromise = v.play();
                  if (playPromise !== undefined) playPromise.catch(e => console.error("播放失败"));
                  
                  activeMedia.push({html: v, el: ve});

                  setTimeout(() => {
                    if (ve.parentNode) ve.parentNode.removeChild(ve);
                    v.pause(); v.currentTime = 0;
                  }, step.duration_ms);
                }
              }
            }, step.time_ms);
            activeTimers.push(startT);
          });
        });

        targetEl.addEventListener("targetLost", () => {
          lostTimeout = setTimeout(() => {
            isPlaying = false;
            
            // 丢失目标后，重新显示引导框
            customScanner.style.display = 'flex';
            
            activeTimers.forEach(clearTimeout);
            activeTimers = [];
            
            activeMedia.forEach(m => { 
              if(m.el.parentNode) m.el.parentNode.removeChild(m.el); 
              try { m.html.pause(); m.html.currentTime = 0; } catch(e){} 
            });
            activeMedia = [];
            subtitleContainer.style.opacity = 0;
            
            lostTimeout = null;
          }, 1000); 
        });
      });
    </script>

    <a-scene mindar-image="imageTargetSrc: targets.mind?v=5; uiScanning: no; uiLoading: no; filterMinCF:0.0001; filterBeta:0.001;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0"></a-entity>
    </a-scene>
  </body>
</html>
