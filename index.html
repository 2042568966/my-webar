<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>AR 视频调试播放器</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      #debug-console { position: fixed; top: 0; left: 0; width: 100%; height: 15vh; background: rgba(0, 0, 0, 0.7); color: #00FF00; font-family: monospace; font-size: 11px; overflow-y: auto; z-index: 9999; padding: 10px; box-sizing: border-box; pointer-events: none; }
      #subtitle-container { position: fixed; bottom: 10%; left: 5%; width: 90%; text-align: center; z-index: 9998; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
      #subtitle-text { display: inline-block; background: rgba(0, 0, 0, 0.6); color: white; padding: 10px 20px; border-radius: 8px; font-size: 16px; }
      #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
      #start-btn { padding: 15px 30px; background: #4CC3D9; border: none; border-radius: 5px; color: white; cursor: pointer; }
    </style>
  </head>
  <body>
    
    <div id="start-screen">
      <h3>小红帽 AR 剧场</h3>
      <button id="start-btn">点击授权媒体播放</button>
    </div>

    <div id="debug-console">> 引擎初始化...<br></div>
    <div id="subtitle-container"><div id="subtitle-text"></div></div>

    <script>
      const debugConsole = document.getElementById('debug-console');
      function printLog(msg, color = '#00FF00') {
        debugConsole.innerHTML += `<div style="color:${color}">> ${msg}</div>`;
        debugConsole.scrollTop = debugConsole.scrollHeight;
      }

      let activeTimers = [];
      let activeMedia = [];

      document.getElementById('start-btn').onclick = () => {
        document.getElementById('start-screen').style.display = 'none';
        printLog("✅ 权限已解锁");
      };

      document.addEventListener("DOMContentLoaded", function() {
        const targetEl = document.querySelector('[mindar-image-target]');
        const subtitleContainer = document.getElementById('subtitle-container');
        const subtitleText = document.getElementById('subtitle-text');

        targetEl.addEventListener("targetFound", () => {
          printLog("🎯 识别成功，加载剧本...");
          
          fetch('./story_config.json')
            .then(res => res.json())
            .then(config => {
              config.timeline.forEach(step => {
                let startT = setTimeout(() => {
                  
                  if (step.action === 'showText') {
                    subtitleText.innerText = step.value;
                    subtitleContainer.style.opacity = 1;
                    setTimeout(() => { if(subtitleText.innerText === step.value) subtitleContainer.style.opacity = 0; }, step.duration_ms);
                  } 
                  
                  else if (step.action === 'playVideo') {
                    printLog(`🎬 准备加载视频: ${step.value}`);
                    
                    const v = document.createElement('video');
                    v.src = encodeURI(step.value); // 自动处理文件名转义
                    v.setAttribute('playsinline', '');
                    v.setAttribute('webkit-playsinline', '');
                    v.crossOrigin = "anonymous";
                    v.style.display = 'none';
                    document.body.appendChild(v);

                    // 视频状态监控
                    v.onplay = () => printLog("▶️ 视频开始播放");
                    v.onerror = (e) => printLog(`❌ 视频加载失败，请检查文件名或格式: ${v.error.message}`, 'red');

                    const ve = document.createElement('a-video');
                    ve.setAttribute('src', v);
                    ve.setAttribute('width', '2');
                    ve.setAttribute('height', '1.125'); // 16:9
                    ve.setAttribute('position', '0 0 0.1'); // 略微浮起，防止深度冲突
                    targetEl.appendChild(ve);
                    activeMedia.push({html: v, el: ve});

                    v.play().catch(err => printLog("🚫 播放被浏览器拦截", 'orange'));

                    // 持续时间结束后移除
                    setTimeout(() => {
                      if (ve.parentNode) ve.parentNode.removeChild(ve);
                      v.pause(); v.remove();
                    }, step.duration_ms);
                  }
                }, step.time_ms);
                activeTimers.push(startT);
              });
            });
        });

        targetEl.addEventListener("targetLost", () => {
          printLog("⚠️ 追踪丢失");
          activeTimers.forEach(clearTimeout);
          activeMedia.forEach(m => { if(m.el.parentNode) m.el.parentNode.removeChild(m.el); m.html.pause(); m.html.remove(); });
          activeMedia = [];
          subtitleContainer.style.opacity = 0;
        });
      });
    </script>

    <a-scene mindar-image="imageTargetSrc: targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0"></a-entity>
    </a-scene>
  </body>
</html>
