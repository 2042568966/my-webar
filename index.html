<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>小红帽 AR 奇幻故事书 - 调试版</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
      
      body { margin: 0; overflow: hidden; font-family: 'ZCOOL KuaiLe', 'Comic Sans MS', 'PingFang SC', sans-serif; }
      
      /* 🐞 屏幕调试控制台 */
      #debug-console { 
        position: fixed; top: 0; left: 0; width: 100%; height: 25vh; 
        background: rgba(0, 0, 0, 0.85); color: #00FF00; 
        font-family: monospace; font-size: 12px; overflow-y: auto; 
        z-index: 99999; padding: 10px; box-sizing: border-box; pointer-events: none; 
      }

      /* 童话风启动屏 */
      #start-screen { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); 
        z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; 
        transition: opacity 0.5s;
      }
      .welcome-card {
        background: rgba(255, 255, 255, 0.95); padding: 40px 30px; border-radius: 30px;
        text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); border: 4px solid #fff; width: 80%; max-width: 320px;
      }
      h2 { color: #ff6b6b; font-size: 28px; margin: 0 0 15px 0; text-shadow: 2px 2px 0px #ffeaa7; }
      p { color: #576574; font-size: 16px; margin-bottom: 30px; font-weight: bold; line-height: 1.4; }
      
      #start-btn { 
        padding: 15px 40px; background: #ff9f43; border: 4px solid #fff; border-radius: 50px; 
        color: white; font-size: 20px; font-weight: bold; cursor: pointer; 
        box-shadow: 0 8px 15px rgba(255, 159, 67, 0.4); animation: pulse 2s infinite ease-in-out; transition: all 0.3s;
      }
      @keyframes pulse {
        0% { transform: scale(1); box-shadow: 0 8px 15px rgba(255, 159, 67, 0.4); }
        50% { transform: scale(1.08); box-shadow: 0 15px 25px rgba(255, 159, 67, 0.6); }
        100% { transform: scale(1); box-shadow: 0 8px 15px rgba(255, 159, 67, 0.4); }
      }

      #custom-scanner {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 9997; pointer-events: none; display: none;
        flex-direction: column; justify-content: center; align-items: center;
      }
      .scan-frame {
        width: 70vw; height: 70vw; max-width: 400px; max-height: 400px;
        border: 6px dashed #ff9f43; border-radius: 20px;
        box-shadow: 0 0 0 100vmax rgba(0, 0, 0, 0.5);
      }
      .scan-tip {
        margin-top: 30px; background: #ff9f43; color: white;
        padding: 12px 25px; border-radius: 30px; font-weight: bold; font-size: 18px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        animation: floatUpDown 2s ease-in-out infinite;
      }
      @keyframes floatUpDown {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      #subtitle-container { position: fixed; bottom: 8%; left: 5%; width: 90%; text-align: center; z-index: 9998; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
      #subtitle-text { display: inline-block; background: #ffffff; color: #576574; padding: 15px 25px; border-radius: 25px; font-size: 18px; text-align: left; line-height: 1.5; max-width: 90%; word-wrap: break-word; box-shadow: 0 8px 20px rgba(0,0,0,0.15); border: 4px solid #ff9f43; position: relative; font-weight: bold; }
      #subtitle-text::after { content: ''; position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%); border-width: 14px 14px 0; border-style: solid; border-color: #ff9f43 transparent transparent transparent; }
      #subtitle-text::before { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); border-width: 10px 10px 0; border-style: solid; border-color: #ffffff transparent transparent transparent; z-index: 1; }
    </style>
  </head>
  <body>
    
    <div id="debug-console">> 系统启动中...<br></div>

    <div id="start-screen">
      <div class="welcome-card">
        <h2>🍄 小红帽奇幻故事书</h2>
        <p>翻开不同的书页<br>就能看到不一样的动画哦！</p>
        <button id="start-btn">开始魔法</button>
      </div>
    </div>

    <div id="custom-scanner">
      <div class="scan-frame"></div>
      <div class="scan-tip">请将当前故事页放进框框里</div>
    </div>

    <div id="subtitle-container"><div id="subtitle-text"></div></div>

    <script>
      // 🐞 屏幕打印函数
      const debugConsole = document.getElementById('debug-console');
      function printLog(msg, color = '#00FF00') {
        debugConsole.innerHTML += `<div style="color:${color}; margin-bottom:4px;">> ${msg}</div>`;
        debugConsole.scrollTop = debugConsole.scrollHeight;
      }

      let globalConfig = null;
      let preloadedVideos = {}; 
      
      let activeVideoHtml = null;
      let activeVideoEl = null;
      let currentPage = -1; 
      let lostTimeout = null;
      
      let engineReady = false;
      let userClicked = false;

      // 1. 获取 JSON
      printLog("开始拉取 story_config.json...");
      fetch('./story_config.json')
        .then(res => {
          if(!res.ok) throw new Error("网络响应不正常 " + res.status);
          return res.json();
        })
        .then(data => { 
          globalConfig = data; 
          printLog("✅ 剧本加载成功，包含 " + (data.pages ? data.pages.length : 0) + " 页数据"); 
        })
        .catch(e => printLog("❌ 加载 JSON 失败: " + e.message, "#FF4444"));

      // 2. 引擎初始化
      document.addEventListener("DOMContentLoaded", function() {
        const sceneEl = document.querySelector('a-scene');
        sceneEl.addEventListener("arReady", () => {
          printLog("✅ AR 引擎底层就绪");
          engineReady = true;
          checkStart(); 
        });
      });

      // 新增一个状态锁，确保视频全部解锁后才进入
      let videosUnlocked = false;

      // 3. 点击预加载 (升级版：异步排队顺次解锁)
      document.getElementById('start-btn').onclick = async function() {
        this.style.pointerEvents = "none";
        printLog("🔓 用户点击，开始排队解锁视频...");
        
        if (globalConfig && globalConfig.pages) {
          const total = globalConfig.pages.length;
          let current = 0;

          // 使用 for...of 配合 await 实现真正的排队处理
          for (let page of globalConfig.pages) {
            current++;
            // 动态更新按钮上的进度提示！
            this.innerText = `✨ 魔法唤醒中 (${current}/${total})...`;
            
            if (page.video) {
              let v = document.createElement('video');
              v.id = 'vid_' + page.index;
              v.src = page.video; 
              v.crossOrigin = "anonymous";
              v.setAttribute('playsinline', '');
              v.setAttribute('webkit-playsinline', '');
              v.setAttribute('preload', 'auto');
              v.style.display = 'none';
              v.muted = true; 
              document.body.appendChild(v);
              preloadedVideos[page.index] = v; 

              try {
                // 等待当前视频真正 play 成功
                await v.play();
                // 成功后，给浏览器 50 毫秒的喘息时间再暂停
                await new Promise(resolve => setTimeout(resolve, 50));
                v.pause(); 
                v.currentTime = 0; 
                v.muted = false; 
                printLog(`📦 第 ${page.index} 页解锁成功`);
              } catch(e) {
                // 即使某个视频报错，也捕获异常，不要让整个程序崩溃
                printLog(`⚠️ 第 ${page.index} 页拦截: ${e.message}`, "#FFDD00");
              }
            } else {
               printLog(`⚠️ 第 ${page.index} 页配置缺少 video 路径`, "#FFDD00");
            }
          }
        } else {
           printLog("❌ 配置中找不到 pages 数组", "#FF4444");
        }
        
        // 所有视频排队处理完毕！
        videosUnlocked = true;
        checkStart(); 
      };

      // 只有当引擎准备好，且视频全部排队解锁完，才真正切换界面
      function checkStart() {
        if (engineReady && videosUnlocked) {
          document.getElementById('start-screen').style.opacity = '0';
          setTimeout(() => { 
            document.getElementById('start-screen').style.display = 'none'; 
            document.getElementById('custom-scanner').style.display = 'flex';
            printLog("🚀 界面切换完毕，可以开始扫描了");
          }, 500);
        }
      }

      // 4. 多页识别逻辑
      document.addEventListener("DOMContentLoaded", function() {
        const targets = document.querySelectorAll('[mindar-image-target]');
        const subtitleContainer = document.getElementById('subtitle-container');
        const subtitleText = document.getElementById('subtitle-text');
        const customScanner = document.getElementById('custom-scanner');

        function stopCurrentPage() {
          if (activeVideoEl && activeVideoEl.parentNode) {
            activeVideoEl.parentNode.removeChild(activeVideoEl);
          }
          if (activeVideoHtml) {
            activeVideoHtml.pause();
          }
          activeVideoEl = null;
          activeVideoHtml = null;
          subtitleContainer.style.opacity = 0;
          currentPage = -1;
        }

        targets.forEach((targetEl, idx) => {
          targetEl.addEventListener("targetFound", () => {
            printLog(`🎯 触发 targetFound，识别序号: ${idx}`);
            
            if (lostTimeout) {
              clearTimeout(lostTimeout);
              lostTimeout = null;
              printLog(`🎯 恢复序号: ${idx} (防抖)`);
            }
            
            if (currentPage === idx) return; 
            
            stopCurrentPage();
            currentPage = idx;
            customScanner.style.display = 'none'; 
            
            if(!globalConfig) {
               printLog("❌ 找不到全局配置数据", "#FF4444");
               return;
            }

            const pageData = globalConfig.pages.find(p => p.index === idx);
            if (!pageData) {
               printLog(`❌ 在 JSON 中找不到 index 为 ${idx} 的数据！`, "#FF4444");
               return;
            }

            // 显示字幕
            subtitleText.innerText = pageData.text;
            subtitleContainer.style.opacity = 1;
            printLog(`💬 显示字幕: ${pageData.text.substring(0, 10)}...`);

            // 挂载视频
            let v = preloadedVideos[idx]; 
            if (v) {
              printLog(`🎬 准备挂载视频，元素 ID: ${v.id}`);
              let ve = document.createElement('a-video');
              ve.setAttribute('src', '#' + v.id);
              ve.setAttribute('width', '1');
              ve.setAttribute('height', '1'); 
              ve.setAttribute('position', '0 0 0.05'); 
              
              targetEl.appendChild(ve);
              printLog(`✅ 视频元素已添加到 3D 场景`);
              
              const playPromise = v.play();
              if (playPromise !== undefined) {
                 playPromise.then(() => {
                    printLog(`▶️ 视频正式开始播放！`);
                 }).catch(e => {
                    printLog(`❌ 视频 play() 执行失败: ${e.message}`, "#FF4444");
                 });
              }
              
              activeVideoHtml = v;
              activeVideoEl = ve;
            } else {
               printLog(`❌ 找不到序号为 ${idx} 的预加载视频对象！`, "#FF4444");
            }
          });

          targetEl.addEventListener("targetLost", () => {
            printLog(`⚠️ 第 ${idx} 页目标丢失，等待防抖缓冲...`, "#FFDD00");
            
            lostTimeout = setTimeout(() => {
              printLog(`🛑 彻底丢失，清理屏幕`);
              stopCurrentPage();
              customScanner.style.display = 'flex'; 
              lostTimeout = null;
            }, 1000); 
          });
        });
      });
    </script>

    <a-scene mindar-image="imageTargetSrc: targets.mind?v=7; uiScanning: no; uiLoading: no; filterMinCF:0.0001; filterBeta:0.001;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      
      <a-entity mindar-image-target="targetIndex: 0"></a-entity>
      <a-entity mindar-image-target="targetIndex: 1"></a-entity>
      <a-entity mindar-image-target="targetIndex: 2"></a-entity>
      <a-entity mindar-image-target="targetIndex: 3"></a-entity>
      <a-entity mindar-image-target="targetIndex: 4"></a-entity>
      <a-entity mindar-image-target="targetIndex: 5"></a-entity>
      <a-entity mindar-image-target="targetIndex: 6"></a-entity>
      <a-entity mindar-image-target="targetIndex: 7"></a-entity>
      <a-entity mindar-image-target="targetIndex: 8"></a-entity>
      <a-entity mindar-image-target="targetIndex: 9"></a-entity>
      <a-entity mindar-image-target="targetIndex: 10"></a-entity>
      <a-entity mindar-image-target="targetIndex: 11"></a-entity>
      <a-entity mindar-image-target="targetIndex: 12"></a-entity>
      <a-entity mindar-image-target="targetIndex: 13"></a-entity>
      <a-entity mindar-image-target="targetIndex: 14"></a-entity>
      <a-entity mindar-image-target="targetIndex: 15"></a-entity>

    </a-scene>
  </body>
</html>
