<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AR 故事可视化工作栈</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* 自定义滚动条 */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .timeline-line::before {
      content: ''; position: absolute; top: 0; bottom: 0; left: 15px; width: 2px; background: #e2e8f0; z-index: 0;
    }
  </style>
</head>
<body class="bg-slate-100 h-screen font-sans overflow-hidden flex flex-col">

  <header class="bg-white shadow-sm border-b border-slate-200 px-6 py-4 flex justify-between items-center z-10">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">
        <i class="fa-solid fa-cube"></i>
      </div>
      <div>
        <h1 class="text-xl font-bold text-slate-800">AR Story Studio</h1>
        <p class="text-xs text-slate-500">剧本可视化编辑器 v2.0</p>
      </div>
    </div>
    <div class="flex gap-4 items-center">
      <div class="flex items-center gap-2 bg-slate-100 px-3 py-2 rounded-md border border-slate-200">
        <i class="fa-solid fa-crosshairs text-slate-400"></i>
        <input type="text" id="targetImage" value="targets.mind" class="bg-transparent border-none outline-none text-sm w-32" placeholder="识别图文件名">
      </div>
      <button onclick="exportJSON()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg font-medium transition shadow-md shadow-indigo-200 flex items-center gap-2">
        <i class="fa-solid fa-download"></i> 导出配置 (JSON)
      </button>
    </div>
  </header>

  <main class="flex-1 flex overflow-hidden">
    
    <div class="w-1/2 p-6 overflow-y-auto border-r border-slate-200 bg-slate-50">
      <div class="flex justify-between items-end mb-6">
        <h2 class="text-lg font-semibold text-slate-800">节点编辑器</h2>
        <button onclick="addEvent()" class="text-indigo-600 bg-indigo-50 hover:bg-indigo-100 px-4 py-2 rounded-md text-sm font-medium transition border border-indigo-200">
          <i class="fa-solid fa-plus mr-1"></i> 添加新事件
        </button>
      </div>
      
      <div id="editor-container" class="space-y-4">
        </div>
    </div>

    <div class="w-1/2 p-6 overflow-y-auto bg-white relative">
      <h2 class="text-lg font-semibold text-slate-800 mb-6 flex items-center gap-2">
        <i class="fa-solid fa-timeline text-slate-400"></i> 剧本时间线预览
      </h2>
      
      <div class="relative timeline-line pl-8 pr-4" id="timeline-preview">
        </div>
    </div>

  </main>

  <input type="file" id="hiddenFilePicker" class="hidden" onchange="handleFileSelected(event)">

  <script>
    let events = [];
    let currentUploadId = null;

    // 获取图标的辅助函数
    const getActionIcon = (action) => {
      if (action === 'showText') return '<i class="fa-solid fa-font text-blue-500 bg-blue-100 p-2 rounded-full"></i>';
      if (action === 'playSound') return '<i class="fa-solid fa-music text-purple-500 bg-purple-100 p-2 rounded-full"></i>';
      if (action === 'playAnimation') return '<i class="fa-solid fa-cube text-orange-500 bg-orange-100 p-2 rounded-full"></i>';
      return '<i class="fa-solid fa-bolt"></i>';
    };

    const getActionLabel = (action) => {
      if (action === 'showText') return '动态文字';
      if (action === 'playSound') return '播放音频';
      if (action === 'playAnimation') return '触发动画';
      return '未知';
    };

    // 1. 初始化添加一个事件
    function addEvent() {
      events.push({ id: Date.now(), time_ms: 0, action: 'showText', value: '' });
      renderUI();
    }

    // 2. 删除事件
    function deleteEvent(id) {
      events = events.filter(e => e.id !== id);
      renderUI();
    }

    // 3. 更新数据并重新渲染
    function updateEvent(id, field, value) {
      const ev = events.find(e => e.id === id);
      if (ev) {
        ev[field] = field === 'time_ms' ? (parseInt(value) || 0) : value;
      }
      renderUI(); // 实时更新时间线
    }

    // 4. 触发本地文件选择
    function triggerFileSelect(id) {
      currentUploadId = id;
      document.getElementById('hiddenFilePicker').click();
    }

    // 5. 处理文件选择结果（提取文件名）
    function handleFileSelected(e) {
      if (!e.target.files.length) return;
      const fileName = e.target.files[0].name;
      // 更新对应事件的 value，并清空 input 以便下次选择同名文件
      updateEvent(currentUploadId, 'value', fileName);
      e.target.value = ''; 
    }

    // 6. 核心渲染逻辑 (同时渲染左侧表单和右侧时间线)
    function renderUI() {
      // 对事件按照时间进行排序
      const sortedEvents = [...events].sort((a, b) => a.time_ms - b.time_ms);

      const editorContainer = document.getElementById('editor-container');
      const timelineContainer = document.getElementById('timeline-preview');
      
      editorContainer.innerHTML = '';
      timelineContainer.innerHTML = '';

      if (sortedEvents.length === 0) {
        timelineContainer.innerHTML = '<div class="text-slate-400 text-center mt-10">暂无事件，请在左侧添加</div>';
      }

      sortedEvents.forEach((ev, index) => {
        // --- 渲染左侧表单 ---
        const needsFileBtn = ev.action !== 'showText';
        editorContainer.innerHTML += `
          <div class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm relative group transition hover:border-indigo-300">
            <button onclick="deleteEvent(${ev.id})" class="absolute top-4 right-4 text-slate-400 hover:text-red-500 transition">
              <i class="fa-solid fa-trash-can"></i>
            </button>
            
            <div class="flex gap-4 mb-4">
              <div class="flex-1">
                <label class="block text-xs font-semibold text-slate-500 mb-1">触发时间 (毫秒)</label>
                <div class="relative">
                  <input type="number" value="${ev.time_ms}" onchange="updateEvent(${ev.id}, 'time_ms', this.value)" class="w-full pl-3 pr-10 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition">
                  <span class="absolute right-3 top-2 text-xs text-slate-400">ms</span>
                </div>
              </div>
              <div class="flex-1">
                <label class="block text-xs font-semibold text-slate-500 mb-1">事件类型</label>
                <select onchange="updateEvent(${ev.id}, 'action', this.value)" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition">
                  <option value="showText" ${ev.action === 'showText' ? 'selected' : ''}>✍️ 显示文字/对白</option>
                  <option value="playSound" ${ev.action === 'playSound' ? 'selected' : ''}>🎵 播放音频/配音</option>
                  <option value="playAnimation" ${ev.action === 'playAnimation' ? 'selected' : ''}>📦 播放 3D 动画</option>
                </select>
              </div>
            </div>

            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1">内容 / 文件名</label>
              <div class="flex gap-2">
                <input type="text" value="${ev.value}" onchange="updateEvent(${ev.id}, 'value', this.value)" placeholder="${needsFileBtn ? '例如: bgm.mp3' : '输入你要显示的文字...'}" class="flex-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition">
                ${needsFileBtn ? `
                  <button onclick="triggerFileSelect(${ev.id})" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 py-2 rounded-lg text-sm transition" title="选择本地文件提取名称">
                    <i class="fa-solid fa-folder-open"></i>
                  </button>
                ` : ''}
              </div>
            </div>
          </div>
        `;

        // --- 渲染右侧时间线 ---
        let displayValue = ev.value || '<span class="text-slate-300 italic">空</span>';
        timelineContainer.innerHTML += `
          <div class="relative mb-8 z-10">
            <div class="absolute -left-[45px] top-1 bg-white border-4 border-slate-100 rounded-full">
              ${getActionIcon(ev.action)}
            </div>
            <div class="bg-slate-50 border border-slate-100 rounded-lg p-4 shadow-sm relative">
              <div class="absolute -left-2 top-4 w-4 h-4 bg-slate-50 border-t border-l border-slate-100 transform -rotate-45"></div>
              <div class="flex justify-between items-start mb-2">
                <span class="text-sm font-bold text-slate-800">${getActionLabel(ev.action)}</span>
                <span class="text-xs font-mono bg-indigo-100 text-indigo-700 px-2 py-1 rounded">T = ${ev.time_ms / 1000} 秒</span>
              </div>
              <p class="text-sm text-slate-600 truncate bg-white p-2 rounded border border-slate-100">
                ${displayValue}
              </p>
            </div>
          </div>
        `;
      });
    }

    // 7. 导出 JSON 功能
    function exportJSON() {
      // 按照时间排序后导出
      const finalTimeline = [...events]
        .sort((a, b) => a.time_ms - b.time_ms)
        .map(({id, ...rest}) => rest); // 去掉内部 id

      const config = {
        targetImage: document.getElementById('targetImage').value,
        timeline: finalTimeline
      };
      
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(config, null, 2));
      const downloadAnchorNode = document.createElement('a');
      downloadAnchorNode.setAttribute("href", dataStr);
      downloadAnchorNode.setAttribute("download", "story_config.json");
      document.body.appendChild(downloadAnchorNode);
      downloadAnchorNode.click();
      downloadAnchorNode.remove();
    }

    // 启动时初始化
    addEvent();
  </script>
</body>
</html>
